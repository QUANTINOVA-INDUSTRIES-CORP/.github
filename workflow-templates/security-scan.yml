name: Security scanning

on:
  push:
    branches:
      - $default-branch
  pull_request:
    branches:
      - $default-branch
  schedule:
    - cron: "23 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-languages:
    name: Detect CodeQL languages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      languages: ${{ steps.detect.outputs.languages }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Detect supported languages
        id: detect
        shell: bash
        run: |
          python <<'PY'
          import json
          import os
          from pathlib import Path

          excluded = {
              ".git", ".github", ".venv", "venv", "node_modules",
              "dist", "build", "coverage", "vendor"
          }
          javascript_suffixes = {".js", ".jsx", ".mjs", ".cjs", ".ts", ".tsx"}
          python_suffixes = {".py"}

          found_javascript = False
          found_python = False

          for path in Path(".").rglob("*"):
              if not path.is_file():
                  continue
              if any(part in excluded for part in path.parts):
                  continue
              suffix = path.suffix.lower()
              found_javascript = found_javascript or suffix in javascript_suffixes
              found_python = found_python or suffix in python_suffixes

          languages = []
          if found_javascript:
              languages.append("javascript-typescript")
          if found_python:
              languages.append("python")

          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as output:
              output.write(f"languages={json.dumps(languages)}\n")

          print(f"Detected CodeQL languages: {languages}")
          PY

  codeql:
    name: CodeQL — ${{ matrix.language }}
    needs: detect-languages
    if: ${{ needs.detect-languages.outputs.languages != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.detect-languages.outputs.languages) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  dependency-review:
    name: Dependency review
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
