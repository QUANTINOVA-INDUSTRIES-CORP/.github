name: Node.js and TypeScript CI

on:
  push:
    branches:
      - $default-branch
  pull_request:
    branches:
      - $default-branch
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: node-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "22.x"
          - "24.x"

    env:
      CI: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Verify lockfile
        shell: bash
        run: |
          if [[ ! -f package-lock.json ]]; then
            echo "::error::package-lock.json is required for reproducible npm CI installs."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run approved dependency lifecycle scripts
        if: ${{ hashFiles('package.json') != '' }}
        shell: bash
        run: |
          # Remove this step if the project does not require lifecycle scripts.
          # Add only reviewed, explicit commands here; do not replace with an unrestricted npm rebuild.
          npm run postinstall --if-present

      - name: Lint
        run: npm run lint --if-present

      - name: Type-check
        run: npm run typecheck --if-present

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present
