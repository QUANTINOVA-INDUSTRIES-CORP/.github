name: Python CI

on:
  push:
    branches:
      - $default-branch
  pull_request:
    branches:
      - $default-branch
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip build

      - name: Install project dependencies
        shell: bash
        run: |
          if [[ -f requirements-dev.txt ]]; then
            python -m pip install -r requirements-dev.txt
          elif [[ -f requirements.txt ]]; then
            python -m pip install -r requirements.txt
          elif [[ -f pyproject.toml ]]; then
            if ! python -m pip install -e ".[dev]"; then
              echo "::warning::The project has no installable 'dev' extra; installing the base project."
              python -m pip install -e .
            fi
          else
            echo "::error::No pyproject.toml, requirements-dev.txt, or requirements.txt dependency definition was found."
            exit 1
          fi

      - name: Install baseline quality tools
        run: python -m pip install pytest ruff

      - name: Validate installed dependencies
        run: python -m pip check

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

      - name: Build distribution
        if: ${{ hashFiles('pyproject.toml') != '' }}
        run: python -m build
